- name: Install all required packages
  hosts: local
  remote_user: root
  become: true

  tasks:
    - name: Install packages
      ansible.builtin.apt:
        update_cache: true
        name:
          # Wireguard and networking
          - wireguard
          - iproute2
          - iptables
          - net-tools
          - ufw
          # FastAPI and python
          - python3
          - python3-venv
          - python3-pip
          - build-essential
          - libffi-dev
          - libssl-dev
          - curl
          # SQlite
          - sqlite3
          # Caddy and certificates
          - caddy
          - ca-certificates
          # General dev
          - git
          - jq
          - qrencode
        state: present