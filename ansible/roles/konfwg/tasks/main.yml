- name: Install required packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
    update_cache: true

- name: Create konfwg group
  ansible.builtin.group:
    name: "{{ konfwg_group }}"
    system: true

- name: Create konfwg user
  ansible.builtin.user:
    name: "{{ konfwg_user }}"
    system: true
    home: "/nonexistent"
    shell: /usr/sbin/nologin
    create_home: false
    
- name: Configure konfwg sudo permissions
  ansible.builtin.copy:
    dest: "{{ konfwg_sudo_path }}/konfwg"
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
    content: |
      Cmnd_Alias KONFWG = \
        /usr/bin/wg, \
        /usr/bin/wg-quick, \
        /bin/systemctl restart wg-quick@{{ wg_interface }}

      {{ konfwg_user }} ALL=(root) NOPASSWD: KONFWG

- name: Create konfwg directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ konfwg_code_path }}", owner: root, group: "{{ konfwg_group }}", mode: "0750" }
    - { path: "{{ konfwg_etc_path }}", owner: root, group: "{{ konfwg_group }}", mode: "0750" }
    - { path: "{{ konfwg_db_path }}", owner: "{{ konfwg_user }}", group: "{{ konfwg_group }}", mode: "0750" }
    - { path: "{{ konfwg_log_path }}", owner: "{{ konfwg_user }}", group: "{{ konfwg_group }}", mode: "0750" }
    - { path: "{{ konfwg_tmp_path }}", owner: "{{ konfwg_user }}", group: "{{ konfwg_group }}", mode: "0750" }

- name: Sync konfwg project to opt
  ansible.posix.synchronize:
    src: "{{ konfwg_local_dir }}/"
    dest: "{{ konfwg_code_path }}/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.gitignore"
      - "--exclude=.venv"
      - "--exclude=venv"
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--exclude=*.pyo"
      - "--exclude=*.pyd"
      - "--exclude=*.egg-info"
      - "--exclude=dist"
      - "--exclude=build"
      - "--exclude=.mypy_cache"
      - "--exclude=.pytest_cache"
      - "--exclude=.ruff_cache"
      - "--exclude=.coverage"
      - "--exclude=htmlcov"
      - "--exclude=.vscode"
      - "--exclude=.idea"
      - "--exclude=.DS_Store"
      - "--exclude=Thumbs.db"
      - "--exclude=setup.sh"

- name: Copy pyproject.toml
  ansible.builtin.copy:
    src: "{{ konfwg_local_dir }}/pyproject.toml"
    dest: "{{ konfwg_code_path }}/"
    owner: "{{ konfwg_user }}"
    group: "{{ konfwg_group }}"
    mode: "0644"

- name: Create venv for source
  ansible.builtin.command:
    cmd: "python3 -m venv {{ konfwg_code_path }}/.venv"
    creates: "{{ konfwg_code_path }}/.venv/bin/python"
  
- name: Install konfwg into new venv
  ansible.builtin.command:
    cmd: "{{ konfwg_code_path }}/.venv/bin/pip install -e ."
    chdir: "{{ konfwg_code_path }}"

- name: Check if konfwg config exists
  ansible.builtin.stat:
    path: "{{ konfwg_etc_path }}/konfwg.conf"
  register: konfwg_conf_stat

- name: Read existing konfwg config
  ansible.builtin.slurp:
    path: "{{ konfwg_etc_path }}/konfwg.conf"
  register: konfwg_conf_raw
  when: konfwg_conf_stat.stat.exists

- name: Set effective secret
  ansible.builtin.set_fact:
    konfwg_secret: >-
      {{
        (
          (
            konfwg_conf_raw.content
            | b64decode
            | regex_findall('(?m)^SECRET=(.+)$')
            | first
          )
          if (
            konfwg_conf_stat.stat.exists and
            (
              konfwg_conf_raw.content
              | b64decode
              | regex_findall('(?m)^SECRET=(.+)$')
              | length
            ) > 0
          )
          else lookup('ansible.builtin.password', '/dev/null length=64 chars=ascii_letters,digits')
        )
      }}

- name: Create konfwg configuration file
  ansible.builtin.template:
    src: konfwg.conf.j2
    dest: "{{ konfwg_etc_path }}/konfwg.conf"
    owner: root
    group: "{{ konfwg_group }}"
    mode: "0640"

- name: Create konfwg systemd unit
  ansible.builtin.template:
    src: konfwg.service.j2
    dest: "{{ konfwg_service_path }}/{{ konfwg_service_name }}"
    owner: root
    group: root
    mode: "0644"

- name: Enable and start konfwg
  ansible.builtin.systemd:
    name: "{{ konfwg_service_name }}"
    enabled: true
    state: started
    daemon_reload: true